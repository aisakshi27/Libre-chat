name: Deploy LibreChat (ECR Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: librechat

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t $IMAGE_NAME .

    - name: Tag Image
      run: |
        docker tag $IMAGE_NAME:latest \
        ${{ secrets.ECR_REPO_URI }}:latest

    - name: Push Image to ECR
      run: |
        docker push ${{ secrets.ECR_REPO_URI }}:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e

          echo "🚀 Starting Docker"
          sudo systemctl start docker

          echo "📦 Installing docker-compose if not present"
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          echo "📁 Setup project directory"

          if [ ! -d "$HOME/librechat" ]; then
            git clone https://github.com/aisakshi27/Libre-chat.git $HOME/librechat
          else
            echo "📂 Repo exists, pulling latest"
            cd $HOME/librechat
            git pull origin main
          fi

          cd $HOME/librechat

          echo "🧹 Stop old containers"
          docker-compose down || true

          echo "🚀 Start all services"
          docker-compose up -d

          echo "✅ Deployment complete"