name: Deploy LibreChat to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          set -e

          # Ensure required tools exist (safe guard)
          if ! command -v git &> /dev/null; then
            sudo yum install git -y
          fi

          if ! command -v docker &> /dev/null; then
            sudo yum install docker -y
            sudo service docker start
            sudo usermod -aG docker ec2-user
          fi

          # Clone repo if not exists (FIXED: HTTPS)
          if [ ! -d "librechat" ]; then
            git clone https://github.com/aisakshi27/Libre-chat.git librechat
          fi

          cd librechat

          # Pull latest code
          git pull origin main

          # Stop and remove old container
          docker stop librechat || true
          docker rm librechat || true

          # Build new image
          docker build -t librechat .

          # Run container
          docker run -d -p 80:3000 --name librechat librechat