name: Deploy LibreChat to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user   # ⚠️ change to 'ubuntu' if using Ubuntu AMI
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          set -e

          # Clone repo if not exists (use HTTPS, not SSH)
          if [ ! -d "librechat" ]; then
            git clone https://github.com/aisakshi27/Libre-chat.git librechat
          fi

          cd librechat

          # Pull latest code
          git pull origin main

          # Stop and remove old container
          docker stop librechat || true
          docker rm librechat || true

          # Build new image
          docker build -t librechat .

          # Run container
          docker run -d -p 80:3000 --name librechat librechat