name: Deploy LibreChat (ECR Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: librechat

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t $IMAGE_NAME .

    - name: Tag Image
      run: |
        docker tag $IMAGE_NAME:latest \
        ${{ secrets.ECR_REPO_URI }}:latest

    - name: Push Image to ECR
      run: |
        docker push ${{ secrets.ECR_REPO_URI }}:latest

- name: Deploy to EC2
  uses: appleboy/ssh-action@v1.0.0
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ec2-user
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      set -e

      echo "🚀 Starting Docker service"
      sudo systemctl start docker

      echo "🔑 Login to ECR"
      aws ecr get-login-password --region us-east-1 | \
      docker login --username AWS --password-stdin 707333744663.dkr.ecr.us-east-1.amazonaws.com

      echo "⬇️ Pull latest image"
      docker pull 707333744663.dkr.ecr.us-east-1.amazonaws.com/librechat:latest

      echo "🛑 Stop old container"
      docker stop librechat || true
      docker rm librechat || true

      echo "🚀 Run new container"
      docker run -d -p 80:3000 \
        --name librechat \
        707333744663.dkr.ecr.us-east-1.amazonaws.com/librechat:latest

      echo "✅ Deployment complete"